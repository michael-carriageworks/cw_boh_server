name: Sync Smartsheet + Deputy

# Runs the existing Python sync on GitHub's servers, on a timer, for free.
# It pulls fresh event/roster data and writes it into Supabase; every device
# then sees the update instantly via Supabase realtime.
on:
  schedule:
    # Every 30 minutes. GitHub's free tier for a PRIVATE repo includes ~2,000
    # minutes/month; a 30-minute cadence stays comfortably inside that. To run
    # more often (e.g. */15) the repo needs to be public or on a paid plan.
    - cron: "*/30 * * * *"
  workflow_dispatch: {}   # lets you also trigger a sync by hand from the Actions tab

# If a sync is somehow still running when the next one fires, skip the new one
# rather than running two at once against the same database.
concurrency:
  group: sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run sync
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SMARTSHEET_TOKEN: ${{ secrets.SMARTSHEET_TOKEN }}
          # Optional overrides — the script has sensible defaults baked in, so
          # these only need setting as GitHub secrets if you want to change them.
          SMARTSHEET_REPORT_ID: ${{ secrets.SMARTSHEET_REPORT_ID }}
          DEPUTY_LOOKAHEAD_DAYS: ${{ secrets.DEPUTY_LOOKAHEAD_DAYS }}
          DEPUTY_BOH_LOCATION_NAMES: ${{ secrets.DEPUTY_BOH_LOCATION_NAMES }}
        run: python sync_precinct_dashboard.py
